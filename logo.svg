<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1C5B52"/>
      <stop offset="55%" stop-color="#14453F"/>
      <stop offset="100%" stop-color="#0C2E2A"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0DFAF"/>
      <stop offset="55%" stop-color="#C79A3D"/>
      <stop offset="100%" stop-color="#9C7526"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E6BE"/>
      <stop offset="100%" stop-color="#D9B463"/>
    </linearGradient>
  </defs>

  <!-- round base -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="#E8D5A3" stroke-opacity="0.28" stroke-width="3"/>

  <!-- dome + minarets silhouette -->
  <g transform="translate(256,300)">
    <!-- base platform -->
    <rect x="-118" y="46" width="236" height="16" rx="3" fill="url(#gold)"/>

    <!-- side minarets -->
    <g fill="url(#goldSoft)">
      <rect x="-112" y="-18" width="14" height="64" rx="3"/>
      <polygon points="-105,-18 -119,-6 -91,-6"/>
      <circle cx="-105" cy="-26" r="4"/>

      <rect x="98" y="-18" width="14" height="64" rx="3"/>
      <polygon points="105,-18 91,-6 119,-6"/>
      <circle cx="105" cy="-26" r="4"/>
    </g>

    <!-- main hall -->
    <rect x="-78" y="10" width="156" height="36" fill="url(#gold)"/>

    <!-- arched doorway -->
    <path d="M -16 46 L -16 20 A 16 16 0 0 1 16 20 L 16 46 Z" fill="#0C2E2A"/>

    <!-- dome -->
    <path d="M -58 10 C -58 -46 -30 -78 0 -78 C 30 -78 58 -46 58 10 Z" fill="url(#goldSoft)"/>
    <path d="M -58 10 C -58 -46 -30 -78 0 -78 C 30 -78 58 -46 58 10 Z" fill="none" stroke="#9C7526" stroke-width="2" stroke-opacity="0.4"/>

    <!-- finial -->
    <rect x="-2.5" y="-96" width="5" height="20" fill="url(#gold)"/>
    <circle cx="0" cy="-99" r="5" fill="url(#gold)"/>
  </g>

  <!-- crescent above dome -->
  <g transform="translate(256,118)">
    <path d="M 30 -34 A 42 42 0 1 0 30 34 A 33 33 0 1 1 30 -34 Z" fill="url(#gold)"/>
  </g>
</svg>
